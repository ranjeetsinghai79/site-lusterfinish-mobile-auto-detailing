name = "webcrew-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
NOTIFICATION_EMAIL = "ranjeetsinghai79@gmail.com"
CALENDLY_URL = "https://calendly.com/ranjeetsinghai79/30min"

# Set secrets via: npx wrangler secret put RESEND_API_KEY
# npx wrangler secret put TWILIO_ACCOUNT_SID
# npx wrangler secret put TWILIO_AUTH_TOKEN
# npx wrangler secret put TWILIO_FROM_NUMBER
# npx wrangler secret put GOOGLE_SERVICE_ACCOUNT_JSON
# npx wrangler secret put LEADS_SHEET_ID
# npx wrangler secret put NEON_DATABASE_URL
# npx wrangler secret put GOOGLE_AI_API_KEY
# npx wrangler secret put RECEPTION_SERVER_URL
# npx wrangler secret put RECEPTION_PROVISION_SECRET
# npx wrangler secret put CAL_WEBHOOK_SECRET
# npx wrangler secret put HITL_SECRET
#
# New routes (no extra secrets needed):
#   POST /call-status   — Twilio missed-call recovery (set as statusCallback on client Twilio numbers)
#   POST /cal-webhook   — Cal.com BOOKING_CREATED webhook (configure in Cal.com → Webhooks)
#
# Cron jobs (GCP Cloud Scheduler — run daily):
#   npm run drip             → drip-followup.ts (day 3 + day 10 follow-ups)
#   npm run review-requests  → send-review-requests.ts (1hr after appointment ends)
#   npm run retention:all    → run-retention-all.ts (GBP + reviews + analytics)

[[routes]]
pattern = "api.webcrew.app/*"
zone_name = "webcrew.app"
